<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生年月日タイプ診断｜Kei 暦ラボ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background-color: #1A1A2E;
  color: #F5F5F0;
  font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  text-align: center;
  padding: 44px 20px 24px;
  border-bottom: 1px solid rgba(201,168,76,0.2);
}

.logo {
  font-family: Georgia, serif;
  font-size: 11px;
  letter-spacing: 6px;
  color: #C9A84C;
  opacity: 0.65;
  margin-bottom: 10px;
}

.site-title {
  font-family: Georgia, serif;
  font-size: 20px;
  color: #C9A84C;
  letter-spacing: 4px;
}

main {
  flex: 1;
  max-width: 560px;
  margin: 0 auto;
  padding: 52px 20px 60px;
  width: 100%;
}

.page-title {
  text-align: center;
  font-size: 22px;
  font-weight: 400;
  letter-spacing: 3px;
  color: #F5F5F0;
  margin-bottom: 14px;
}

.page-subtitle {
  text-align: center;
  font-size: 13px;
  color: rgba(245,245,240,0.55);
  line-height: 2;
  margin-bottom: 48px;
}

.form-container {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,168,76,0.22);
  border-radius: 12px;
  padding: 38px 36px 36px;
}

.form-label {
  display: block;
  font-size: 11px;
  color: #C9A84C;
  letter-spacing: 3px;
  margin-bottom: 18px;
}

.date-inputs {
  display: flex;
  gap: 12px;
  margin-bottom: 30px;
}

.date-field {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.date-field label {
  font-size: 10px;
  color: rgba(245,245,240,0.4);
  letter-spacing: 2px;
  text-align: center;
}

.date-field select {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(201,168,76,0.28);
  border-radius: 6px;
  color: #F5F5F0;
  font-size: 15px;
  padding: 13px 6px;
  width: 100%;
  appearance: none;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.2s;
}

.date-field select:focus {
  outline: none;
  border-color: rgba(201,168,76,0.7);
}

.date-field select option {
  background: #1A1A2E;
}

.calc-btn {
  width: 100%;
  background: #C9A84C;
  color: #1A1A2E;
  border: none;
  border-radius: 6px;
  padding: 16px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 5px;
  cursor: pointer;
  transition: opacity 0.2s;
}

.calc-btn:hover { opacity: 0.82; }

/* Result */
.result-container {
  display: none;
  margin-top: 44px;
  text-align: center;
  animation: fadeUp 0.55s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-label {
  font-size: 10px;
  letter-spacing: 5px;
  color: rgba(201,168,76,0.6);
  margin-bottom: 22px;
}

.result-hr {
  width: 48px;
  height: 1px;
  background: rgba(201,168,76,0.35);
  margin: 0 auto 26px;
}

.result-kan {
  font-family: Georgia, serif;
  font-size: 64px;
  color: #C9A84C;
  letter-spacing: 4px;
  margin-bottom: 8px;
  line-height: 1;
}

.result-reading {
  font-size: 12px;
  color: rgba(245,245,240,0.4);
  letter-spacing: 4px;
  margin-bottom: 18px;
}

.result-type {
  font-size: 21px;
  color: #F5F5F0;
  letter-spacing: 2px;
  font-weight: 400;
  margin-bottom: 26px;
}

.result-keywords {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 28px;
}

.keyword-tag {
  background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.28);
  color: #C9A84C;
  font-size: 11px;
  padding: 5px 16px;
  border-radius: 20px;
  letter-spacing: 1px;
}

.result-desc {
  font-size: 14px;
  line-height: 2;
  color: rgba(245,245,240,0.72);
  text-align: left;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,168,76,0.13);
  border-radius: 8px;
  padding: 24px 26px;
  margin-bottom: 34px;
}

.cta-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.cta-btn {
  display: inline-block;
  background: transparent;
  border: 1px solid #C9A84C;
  color: #C9A84C;
  border-radius: 6px;
  padding: 15px 32px;
  font-size: 13px;
  letter-spacing: 3px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
}

.cta-btn:hover {
  background: #C9A84C;
  color: #1A1A2E;
}

.cta-sub {
  font-size: 11px;
  color: rgba(245,245,240,0.3);
  letter-spacing: 1px;
}

.cta-consult {
  display: inline-block;
  margin-top: 6px;
  font-size: 12px;
  color: rgba(201,168,76,0.55);
  letter-spacing: 1px;
  text-decoration: none;
  border-bottom: 1px solid rgba(201,168,76,0.25);
  padding-bottom: 2px;
  transition: color 0.2s;
}

.cta-consult:hover { color: #C9A84C; }

footer {
  text-align: center;
  padding: 28px 20px;
  border-top: 1px solid rgba(201,168,76,0.1);
  font-size: 10px;
  color: rgba(245,245,240,0.25);
  letter-spacing: 2px;
}

@media (max-width: 460px) {
  .form-container { padding: 28px 18px 26px; }
  .date-inputs { gap: 8px; }
  .result-kan { font-size: 52px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">KOYOMI LAB</div>
  <div class="site-title">Kei｜暦ラボ</div>
</header>

<main>
  <h1 class="page-title">生年月日タイプ診断</h1>
  <p class="page-subtitle">
    生年月日を入力してください<br>
    あなたの日干タイプを判定します
  </p>

  <div class="form-container">
    <span class="form-label">生 年 月 日</span>
    <div class="date-inputs">
      <div class="date-field">
        <label>年</label>
        <select id="sel-year"></select>
      </div>
      <div class="date-field">
        <label>月</label>
        <select id="sel-month"></select>
      </div>
      <div class="date-field">
        <label>日</label>
        <select id="sel-day"></select>
      </div>
    </div>
    <button class="calc-btn" onclick="calculate()">判 定 す る</button>
  </div>

  <div class="result-container" id="result">
    <div class="result-label">あなたの日干タイプ</div>
    <div class="result-hr"></div>
    <div class="result-kan"     id="r-kan"></div>
    <div class="result-reading" id="r-reading"></div>
    <div class="result-type"    id="r-type"></div>
    <div class="result-keywords" id="r-keywords"></div>
    <div class="result-desc"    id="r-desc"></div>
    <div class="cta-section">
      <a class="cta-btn" id="r-cta" href="#" target="_blank">このタイプの取扱説明書を見る</a>
      <span class="cta-sub">詳細PDF（1,480円）｜note にて販売中</span>
      <a class="cta-consult" href="https://coconala.com/" target="_blank">
        さらに個別の命式を読む → 鑑定はこちら
      </a>
    </div>
  </div>
</main>

<footer>© Kei｜暦ラボ　東洋命理学（四柱推命）をベースにした本格鑑定</footer>

<script>
// ---- セレクトボックス生成 ----
(function() {
  const ySel = document.getElementById('sel-year');
  const mSel = document.getElementById('sel-month');
  const dSel = document.getElementById('sel-day');

  for (let y = 2026; y >= 1940; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y + '年';
    ySel.appendChild(o);
  }
  ySel.value = 1990;

  for (let m = 1; m <= 12; m++) {
    const o = document.createElement('option');
    o.value = m; o.textContent = m + '月';
    mSel.appendChild(o);
  }

  for (let d = 1; d <= 31; d++) {
    const o = document.createElement('option');
    o.value = d; o.textContent = d + '日';
    dSel.appendChild(o);
  }
})();

// ---- 日干データ ----
const KAN_DATA = [
  {
    kan:'甲', reading:'こう・きのえ', type:'巨木タイプ',
    keywords:['成長','志','まっすぐ','開拓'],
    desc:'大地に根を張る巨木のような存在。高い志と向上心を持ち、一つのことを深く追求します。リーダー気質がありますが、曲げられることを極端に嫌う一面も。自分なりの「道」を歩むことで最も輝きます。',
    url:'https://note.com/' // ← 甲タイプ記事のURLに変更してください
  },
  {
    kan:'乙', reading:'おつ・きのと', type:'花タイプ',
    keywords:['柔軟','共感','縁','しなやか'],
    desc:'しなやかな花のように、環境に適応しながら美しく咲く存在。人との繋がりを大切にし、場の空気を読むのが得意です。強引さはないぶん、細やかな気遣いで人の心をつかみます。',
    url:'https://note.com/'
  },
  {
    kan:'丙', reading:'へい・ひのえ', type:'太陽タイプ',
    keywords:['明るさ','情熱','華','行動力'],
    desc:'太陽のように周囲を照らす存在。エネルギッシュで行動力があり、自然と注目を集めます。場を明るくする力を持ちますが、感情が表に出やすい一面も。人前に立つことで才能が開花します。',
    url:'https://note.com/'
  },
  {
    kan:'丁', reading:'てい・ひのと', type:'灯火タイプ',
    keywords:['繊細','洞察','温もり','芸術性'],
    desc:'ろうそくの炎のように、静かに深く燃える存在。繊細な感受性と鋭い洞察力を持ち、人の感情や場の変化を敏感に察知します。表には出しませんが、内側に強い情熱を秘めています。',
    url:'https://note.com/'
  },
  {
    kan:'戊', reading:'ぼ・つちのえ', type:'山タイプ',
    keywords:['安定','信頼','包容力','どっしり'],
    desc:'大地や山のようにどっしりとした存在。揺るぎない安定感があり、周囲から信頼されます。感情の波が少なく、長期にわたって物事をやり遂げる力があります。縁の下の力持ちとして組織を支えます。',
    url:'https://note.com/'
  },
  {
    kan:'己', reading:'き・つちのと', type:'大地タイプ',
    keywords:['育てる','サポート','実用','着実'],
    desc:'豊かな大地のように、人やものを育む存在。実用的な発想と、こつこつと積み上げる力が特徴です。人を支えることに喜びを感じ、教育・サービス・医療などの分野で才能を発揮します。',
    url:'https://note.com/'
  },
  {
    kan:'庚', reading:'こう・かのえ', type:'刀タイプ',
    keywords:['意志','潔さ','改革','白黒'],
    desc:'刃のように鋭く、強い意志を持つ存在。白黒はっきりさせたい性格で、曖昧さや妥協を好みません。正義感が強く、古いものを壊して新しいものを作る改革力を持ちます。',
    url:'https://note.com/'
  },
  {
    kan:'辛', reading:'しん・かのと', type:'宝石タイプ',
    keywords:['審美眼','こだわり','洗練','プライド'],
    desc:'磨かれた宝石のように、美と品質へのこだわりを持つ存在。高い審美眼と繊細なセンスが特徴です。自分の世界観を大切にし、妥協のないクオリティを追求します。',
    url:'https://note.com/'
  },
  {
    kan:'壬', reading:'じん・みずのえ', type:'海タイプ',
    keywords:['スケール','自由','知性','受容'],
    desc:'海のように広大なスケールと自由を愛する存在。情報収集力と知的好奇心が高く、どんなものも受け入れる包容力があります。型にはまることを嫌い、自由な環境で最も力を発揮します。',
    url:'https://note.com/'
  },
  {
    kan:'癸', reading:'き・みずのと', type:'雨タイプ',
    keywords:['知性','直感','繊細','深く考える'],
    desc:'雨や霧のように、静かに深く浸透する存在。高い知性と鋭い直感力を持ち、物事の本質を見抜きます。外見は穏やかでも内側では深く思考しており、分析・研究・創作の分野に向いています。',
    url:'https://note.com/'
  }
];

// ---- ユリウス通日の計算 ----
function getJDN(y, m, d) {
  const a = Math.floor((14 - m) / 12);
  const yr = y + 4800 - a;
  const mo = m + 12 * a - 3;
  return d
    + Math.floor((153 * mo + 2) / 5)
    + 365 * yr
    + Math.floor(yr / 4)
    - Math.floor(yr / 100)
    + Math.floor(yr / 400)
    - 32045;
}

// ---- 日干インデックスの計算 ----
function getDayKanIndex(y, m, d) {
  const jdn = getJDN(y, m, d);
  return ((jdn + 49) % 60 + 60) % 60 % 10;
}

// ---- 判定・表示 ----
function calculate() {
  const y = parseInt(document.getElementById('sel-year').value);
  const m = parseInt(document.getElementById('sel-month').value);
  const d = parseInt(document.getElementById('sel-day').value);

  // バリデーション
  const check = new Date(y, m - 1, d);
  if (check.getFullYear() !== y || check.getMonth() !== m - 1 || check.getDate() !== d) {
    alert('正しい日付を入力してください');
    return;
  }

  const idx  = getDayKanIndex(y, m, d);
  const data = KAN_DATA[idx];

  document.getElementById('r-kan').textContent     = data.kan;
  document.getElementById('r-reading').textContent = data.reading;
  document.getElementById('r-type').textContent    = data.type;
  document.getElementById('r-desc').textContent    = data.desc;

  const kwEl = document.getElementById('r-keywords');
  kwEl.innerHTML = '';
  data.keywords.forEach(kw => {
    const tag = document.createElement('span');
    tag.className = 'keyword-tag';
    tag.textContent = kw;
    kwEl.appendChild(tag);
  });

  const cta = document.getElementById('r-cta');
  cta.href        = data.url;
  cta.textContent = data.kan + '（' + data.type + '）の取扱説明書を見る';

  const el = document.getElementById('result');
  el.style.display   = 'block';
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'fadeUp 0.55s ease';
  setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}
</script>

</body>
</html>
